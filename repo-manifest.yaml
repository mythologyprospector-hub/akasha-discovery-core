repo:
  name: akasha-discovery-core
  ecosystem: akasha
  version: 0.1.0
  status: active

engine:
  family: discovery
  class: discovery_engine
  role: foundational_discovery_logic

identity:
  role: engine
  layer: discovery
  description: >
    Core discovery logic engine for the Akasha constellation.
    Responsible for housing the foundational mechanisms, primitives, and internal
    logic used by discovery-oriented subsystems across the wider ecosystem.

ownership:
  steward: human
  approval_required: true

interfaces:
  consumes:
    - ontology_models
    - graph_phase_models
    - foundational_discovery_inputs
  produces:
    - discovery_primitives
    - reusable_discovery_logic
    - core_candidate_generation_outputs

capabilities:
  - foundational_discovery_modeling
  - reusable_candidate_generation
  - discovery_logic_structuring
  - cross_engine_discovery_support

alignment:
  axioms_required: true
  canonical_structure: true
  interpretation_free_core: true

depends_on:
  - akasha-ontology
  - akasha-graph-phases
